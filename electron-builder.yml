appId: kr.pokehaven.launcher
productName: PokeHaven Frontier
# asar must be off: the install/launch worker is forked with a real Node binary
# (Electron's own Node hangs on it), and a forked Node can't read files from an
# asar archive. Plain files on disk keep the worker + its deps readable.
asar: false

directories:
  output: release
  buildResources: build

# Only the electron-vite build output (NOT out/manifest-stage, the 498MB modpack
# staging dir). Production node_modules are included automatically. build/node
# holds the bundled Node copied by fetch-node.mjs.
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - package.json
extraResources:
  - from: build/node
    to: node

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}

mac:
  category: public.app-category.games
  identity: null # unsigned (no Apple Developer account) — users right-click → Open
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

dmg:
  artifactName: ${productName}-${version}-arm64.${ext}
